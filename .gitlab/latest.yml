.latest:
  image: kitware/paraview-for-ci:latest
  variables:
    PARAVIEW_VERSION: "latest"

build_plugin_latest:
  extends:
    - .build_plugin
    - .latest

test_plugin_latest:
  extends:
    - .test_plugin
    - .latest
  dependencies:
    - build_plugin_latest
  needs:
    - build_plugin_latest

.binary_latest:
  image: kitware/paraview_org-plugin-devel:latest
  variables:
    PARAVIEW_VERSION: "latest"

build_binary_compatible_latest:
  extends:
    - .build_binary_compatible
    - .binary_latest
