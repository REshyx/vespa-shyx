.tags:
  tags:
    - build
    - docker
    - linux-x86_64
    - vtk-cgal

.build:
  extends:
    - .tags
  stage: build
  artifacts:
    expire_in: 12h
    when: always
    paths:
      - build/
  interruptible: true

.build_plugin_artifact:
  extends:
    - .build
  before_script:
    - source /opt/rh/devtoolset-7/enable
  script:
      # This is needed because the build of ParaView use some absolute path
    - ln -s /paraview/gitlab-kitware-sciviz-ci/ /builds/gitlab-kitware-sciviz-ci
    - export CFLAGS=-fPIC
    - export CPPFLAGS=-fPIC
    - export CXXFLAGS=-fPIC
    - cd /builds/vtk/meshing/
    - ./vespa/.gitlab/ci/gmp.sh
    - ./vespa/.gitlab/ci/mpfr.sh
    - ./vespa/.gitlab/ci/eigen.sh
    - ./vespa/.gitlab/ci/cgal.sh
    - ./vespa/.gitlab/ci/boost.sh
    - cd vespa
    - mkdir build
    - cd build
    - |
      GMP_DIR=/builds/vtk/meshing/gmp/install \
      MPFR_DIR=/builds/vtk/meshing/mpfr/install \
      cmake \
      -DBUILD_PYTHON_WRAPPERS=OFF \
      -DBUILD_TESTING=ON \
      -DBoost_DIR=/builds/vtk/meshing/boost/install/lib64/cmake/Boost-1.86.0/ \
      -DCGAL_DIR=/builds/vtk/meshing/cgal/install/lib64/cmake/CGAL/ \
      -DCMAKE_BUILD_TYPE=Release \
      -DCMAKE_PREFIX_PATH=/builds/gitlab-kitware-sciviz-ci/build/install/ \
      -DEigen3_DIR=/builds/vtk/meshing/eigen/install/share/eigen3/cmake/ \
      -DFORCE_STATIC_MODULES=ON \
      -DVESPA_BUILD_PV_PLUGIN=ON \
      -S ..
    - cmake --build . --parallel 2
  tags:
    # Needed because qhelpgenerator would fail with illegal instructions without it
    - linux-x86_64-v3

.build_module:
  extends:
    - .build
  script:
    - apt update
    - apt install -y libgmp3-dev libmpfr-dev
    - cd /builds/vtk/meshing/
    - ./vespa/.gitlab/ci/eigen.sh
    - ./vespa/.gitlab/ci/cgal.sh
    - ./vespa/.gitlab/ci/boost.sh
    - cd vespa
    - mkdir build
    - cd build
    - |
      cmake \
      -DBUILD_TESTING=ON  \
      -DBoost_DIR=/builds/vtk/meshing/boost/install/lib/cmake/Boost-1.86.0/ \
      -DCGAL_DIR=/builds/vtk/meshing/cgal/install/lib/cmake/CGAL/ \
      -DCMAKE_BUILD_TYPE=Release \
      -DEigen3_DIR=/builds/vtk/meshing/eigen/install/share/eigen3/cmake/ \
      -DVTK_DIR=/vtk/build/ \
      -S ..
    - cmake --build . --parallel 2

.build_plugin:
  extends:
    - .build
  script:
    - apt update
    - apt install -y libgmp3-dev libmpfr-dev
    - cd /builds/vtk/meshing/
    - ./vespa/.gitlab/ci/eigen.sh
    - ./vespa/.gitlab/ci/cgal.sh
    - cd vespa
    - mkdir build
    - cd build
    - |
      cmake \
      -DBUILD_TESTING=ON \
      -DCMAKE_PREFIX_PATH=/opt/paraview/install/ \
      -DCGAL_DIR=/builds/vtk/meshing/cgal/install/lib/cmake/CGAL/ \
      -DCMAKE_BUILD_TYPE=Release \
      -DEigen3_DIR=/builds/vtk/meshing/eigen/install/share/eigen3/cmake/ \
      -DVESPA_BUILD_PV_PLUGIN=ON \
      -S ..
    - cmake --build . --parallel 2

.test:
  extends:
    - .tags
  stage: test
  artifacts:
    expire_in: 1h
    when: always
    paths:
      - build/
  interruptible: true

.test_plugin:
  extends:
    - .test
  script:
    - cd build
    - xvfb-run ctest -j 2 --output-on-failure --no-tests=error || xvfb-run ctest -j 1 --rerun-failed --no-tests=error -VV

.test_module:
  extends:
    - .test
  script:
    - cd build
    - ctest -j 2 --output-on-failure --no-tests=error || ctest -j 1 --rerun-failed --no-tests=error -VV
