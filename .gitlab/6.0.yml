.binary_6_0:
  image: kitware/paraview_org-plugin-devel:6.0.1
  variables:
    PARAVIEW_VERSION: "6.0.1"

build_plugin_artifact_6.0.1:
  before_script:
    - scl enable gcc-toolset-10 --
  extends:
    - .build_plugin_artifact
    - .binary_6_0

.v6_0:
  image: kitware/paraview-for-ci:v6.0.1
  variables:
    PARAVIEW_VERSION: "6.0.1"

build_plugin_v6.0.1:
  extends:
    - .build_plugin
    - .v6_0

test_plugin_v6.0.1:
  extends:
    - .test_plugin
    - .v6_0
  dependencies:
    - build_plugin_v6.0.1
  needs:
    - build_plugin_v6.0.1
