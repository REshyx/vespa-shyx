.binary_5_11:
  image: kitware/paraview_org-plugin-devel:5.11.2
  variables:
    PARAVIEW_VERSION: "5.11.2"

build_plugin_artifact_5.11.2:
  before_script:
    - source /opt/rh/devtoolset-7/enable
  extends:
    - .build_plugin_artifact
    - .binary_5_11

.v5_11:
  image: kitware/paraview-for-ci:v5.11.2
  variables:
    PARAVIEW_VERSION: "5.11.2"

build_plugin_v5.11.2:
  extends:
    - .build_plugin
    - .v5_11

test_plugin_v5.11.2:
  extends:
    - .test_plugin
    - .v5_11
  dependencies:
    - build_plugin_v5.11.2
  needs:
    - build_plugin_v5.11.2
